<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personalized Health Plan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;
    const { createRoot } = ReactDOM;

    // Use inline SVG for icons to avoid dependency issues
    const Download = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    );

    const Loader2 = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
      </svg>
    );

    const Sparkles = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M12 21.35l-1.45-1.32C5.4 15.35 2 12.28 2 8.5a4 4 0 0 1 4-4c1.03 0 2.05.29 2.92.83C9.72 4.41 10.74 4 12 4c1.26 0 2.28.41 3.08.83C15.95 4.29 16.97 4 18 4a4 4 0 0 1 4 4.5c0 3.78-3.4 6.85-8.55 11.53L12 21.35zM12 9c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
      </svg>
    );

    // --- NEW LOGIC FOR PERSONALIZED CONTENT ---
    const getDietaryAnalysis = (dailyFoodIntake) => {
      const intakeLower = dailyFoodIntake.toLowerCase();
      const analysis = {
        healthy: {
          count: 0,
          foods: [],
        },
        unhealthy: {
          count: 0,
          foods: [],
        },
        dietary: {
          isVegetarian: false,
          isVegan: false,
          isHighProtein: false,
        }
      };
    
      const healthyKeywords = {
        protein: ['chicken', 'fish', 'eggs', 'beans', 'tofu', 'lentils', 'lean meat', 'salmon'],
        vegetables: ['salad', 'spinach', 'broccoli', 'carrots', 'vegetables', 'greens', 'asparagus'],
        fruits: ['fruit', 'apple', 'banana', 'berries', 'orange'],
        grains: ['oats', 'quinoa', 'brown rice', 'whole wheat'],
        fats: ['avocado', 'nuts', 'seeds', 'olive oil'],
      };
    
      const unhealthyKeywords = {
        sugar: ['soda', 'candy', 'juice', 'dessert', 'sugar'],
        processed: ['chips', 'processed', 'snack', 'fast food', 'junk food'],
        fried: ['fried', 'pizza', 'burger', 'fries'],
        refined: ['white bread', 'white pasta'],
      };
    
      Object.keys(healthyKeywords).forEach(key => {
        healthyKeywords[key].forEach(word => {
          if (intakeLower.includes(word)) {
            analysis.healthy.count++;
            analysis.healthy.foods.push(word);
          }
        });
      });
    
      Object.keys(unhealthyKeywords).forEach(key => {
        unhealthyKeywords[key].forEach(word => {
          if (intakeLower.includes(word)) {
            analysis.unhealthy.count++;
            analysis.unhealthy.foods.push(word);
          }
        });
      });
    
      if (intakeLower.includes('vegetarian') || analysis.healthy.foods.includes('tofu') || analysis.healthy.foods.includes('lentils')) {
        analysis.dietary.isVegetarian = true;
      }
      if (intakeLower.includes('vegan')) {
        analysis.dietary.isVegan = true;
      }
      if (analysis.healthy.foods.includes('chicken') || analysis.healthy.foods.includes('fish') || intakeLower.includes('protein')) {
        analysis.dietary.isHighProtein = true;
      }

      return analysis;
    };

    const generatePersonalizedReport = (formData) => {
      const { age, weight, height, dailyFoodIntake, activityLevel } = formData;
      const heightInMeters = height / 100;
      const bmi = (weight / (heightInMeters * heightInMeters)).toFixed(2);
      const dietaryAnalysis = getDietaryAnalysis(dailyFoodIntake);

      let analysisText = `Based on your input, your BMI of **${bmi}** is a good starting point.`;
      const whatToInclude = [`More fruits and vegetables (aim for a variety of colors)`];
      const whatToExclude = [`Highly processed snacks and sugary drinks`];

      if (dietaryAnalysis.healthy.count > dietaryAnalysis.unhealthy.count) {
        analysisText = `Your diet shows a good balance of healthy foods. A BMI of **${bmi}** indicates your status. Let's focus on refining your choices.`;
      } else {
        analysisText = `Based on your BMI of **${bmi}**, your current diet may be lacking in key nutrients. You could benefit from a significant shift toward whole foods.`;
      }

      if (dietaryAnalysis.healthy.foods.length > 0) {
        whatToInclude.push(`You're already doing well by including foods like: ${[...new Set(dietaryAnalysis.healthy.foods)].join(', ')}.`);
      }
      
      if (dietaryAnalysis.unhealthy.foods.length > 0) {
        whatToExclude.push(`Based on your intake, try to reduce foods like: ${[...new Set(dietaryAnalysis.unhealthy.foods)].join(', ')}.`);
      }

      if (dietaryAnalysis.healthy.foods.some(f => ['protein', 'chicken', 'fish'].includes(f)) === false) {
          whatToInclude.push(`Focus on adding lean proteins for muscle maintenance and satiety.`);
      }

      if (dietaryAnalysis.healthy.foods.some(f => ['vegetables', 'salad', 'greens'].includes(f)) === false) {
          whatToInclude.push(`Incorporate more leafy greens and a variety of colorful vegetables.`);
      }
      
      // Adjust based on activity level
      if (activityLevel === 'high') {
        whatToInclude.unshift(`Adequate protein for muscle repair and complex carbs for sustained energy.`);
      }

      const mentalBoostRecommendations = [
        `Omega-3 fatty acids from fish like salmon and walnuts`,
        `B-vitamins found in leafy greens, eggs, and dairy`,
        `Antioxidants from berries and dark chocolate`
      ];

      const pdfReportContent = `# Personalized Health Plan Report for a ${age}-Year-Old

## Analysis of Your Diet
${analysisText}

## What to Include
- ${[...new Set(whatToInclude)].join('\n- ')}

## What to Exclude
- ${[...new Set(whatToExclude)].join('\n- ')}

## Mental Boost Recommendations
- ${mentalBoostRecommendations.join('\n- ')}

*Note:* This is a general guide. Please consult with a healthcare professional for personalized advice.
`;

      return {
        analysis: analysisText,
        whatToInclude: [...new Set(whatToInclude)],
        whatToExclude: [...new Set(whatToExclude)],
        mentalBoostRecommendations,
        pdfReportContent,
      };
    };

    const generatePersonalizedMealPlan = (formData) => {
      const { dailyFoodIntake, activityLevel } = formData;
      const dietaryAnalysis = getDietaryAnalysis(dailyFoodIntake);
      const isVegetarian = dietaryAnalysis.dietary.isVegetarian;

      let baseMealPlan = [
        { "mealName": "Breakfast", "foods": ["Oatmeal with nuts and berries."] },
        { "mealName": "Lunch", "foods": ["A large salad with a good protein source food."] },
        { "mealName": "Dinner", "foods": ["Protein source food with roasted vegetables and a complex carb."] }
      ];

      if (isVegetarian) {
        baseMealPlan = [
          { "mealName": "Breakfast", "foods": ["Greek yogurt with mixed seeds and a side of fruit."] },
          { "mealName": "Lunch", "foods": ["Lentil soup with whole-grain bread and a side salad."] },
          { "mealName": "Dinner", "foods": ["Tofu stir-fry with broccoli, bell peppers, and brown rice."] }
        ];
      }

      if (activityLevel === 'high') {
        baseMealPlan.forEach(meal => {
          if (meal.mealName === "Breakfast") meal.foods[0] += " Consider adding a protein shake.";
          if (meal.mealName === "Lunch") meal.foods[0] += " Add a larger serving of quinoa or brown rice.";
          if (meal.mealName === "Dinner") meal.foods[0] += " Ensure generous portions of all components.";
        });
      }

      if (dietaryAnalysis.unhealthy.count > 0) {
        baseMealPlan.forEach(meal => {
            meal.foods.push("Try to replace your typical snack with a healthy alternative like an apple or a handful of almonds.");
        });
      }

      return baseMealPlan;
    };
    // --- END OF NEW LOGIC ---

    const App = () => {
      // State management for user input and app state
      const [appState, setAppState] = useState('form'); // 'form', 'loading', 'results'
      const [formData, setFormData] = useState({
        age: '',
        weight: '',
        height: '',
        activityLevel: 'low',
        dailyFoodIntake: '',
      });
      const [healthPlan, setHealthPlan] = useState(null);
      const [error, setError] = useState(null);
      const [mealPlanLoading, setMealPlanLoading] = useState(false);
      const [mealPlan, setMealPlan] = useState(null);

      // Handle form input changes
      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData((prev) => ({ ...prev, [name]: value }));
      };
      
      const handleSubmit = async (e) => {
        e.preventDefault();
        setAppState('loading');
        setError(null);
        setMealPlan(null);

        // Call the new personalized function
        setTimeout(() => {
          try {
            const newHealthPlan = generatePersonalizedReport(formData);
            setHealthPlan(newHealthPlan);
            setAppState('results');
          } catch (e) {
            setError("There was an error generating your report. Please check your inputs.");
            setAppState('form');
          }
        }, 1500); // Simulate a network delay
      };

      // Generate PDF report
      const handlePdfGeneration = () => {
        const { jsPDF } = window.jspdf;
        if (!jsPDF) {
          setError("PDF generation is not available. Please try again later.");
          return;
        }
        if (!healthPlan || !healthPlan.pdfReportContent) return;

        const doc = new jsPDF();
        doc.setFontSize(22);
        doc.text('Personalized Health Plan Report', 10, 20);

        const reportContent = healthPlan.pdfReportContent
          .replace(/^(#+)\s/gm, '') // Remove Markdown headings
          .replace(/^-/gm, '•') // Replace list hyphens
          .replace(/\\/g, ''); // Remove bold markdown

        const lines = doc.splitTextToSize(reportContent, doc.internal.pageSize.getWidth() - 20);
        
        doc.setFontSize(12);
        doc.text(lines, 10, 30);
        doc.save('health_plan_report.pdf');
      };

      // Handle meal plan generation
      const handleGenerateMealPlan = () => {
        setMealPlanLoading(true);
        setMealPlan(null);
        setError(null);
        
        // Call the new personalized function
        setTimeout(() => {
          try {
            const newMealPlan = generatePersonalizedMealPlan(formData);
            setMealPlan(newMealPlan);
            setMealPlanLoading(false);
          } catch (e) {
            setError("There was an error generating your meal plan.");
            setMealPlanLoading(false);
          }
        }, 1500); // Simulate a network delay
      };

      // Render the application based on its state
      const renderContent = () => {
        if (appState === 'loading') {
          return (
            <div className="flex flex-col items-center justify-center p-8 text-white">
              <Loader2 className="animate-spin h-10 w-10 text-white" />
              <p className="mt-4 text-lg font-semibold">Generating your personalized plan...</p>
            </div>
          );
        }

        if (appState === 'results') {
          return (
            <div className="bg-white bg-opacity-90 p-8 rounded-2xl shadow-lg w-full max-w-4xl animate-in fade-in slide-in-from-bottom-8 duration-500">
              <div className="flex justify-between items-center mb-6">
                <h2 className="text-3xl md:text-4xl font-extrabold text-gray-800">Your Health Plan</h2>
                <button
                  onClick={handlePdfGeneration}
                  className="px-4 py-2 bg-gradient-to-r from-blue-500 to-indigo-600 text-white rounded-xl shadow-md hover:shadow-lg transition-all flex items-center gap-2"
                >
                  <Download />
                  Download PDF
                </button>
              </div>
              
              {healthPlan && (
                <div className="space-y-6">
                  <section>
                    <h3 className="text-xl font-bold text-gray-700 mb-2">Analysis of Your Diet</h3>
                    <p className="text-gray-600 leading-relaxed" dangerouslySetInnerHTML={{ __html: healthPlan.analysis.replace(/\\(.?)\\*/g, '<strong>$1</strong>') }}></p>
                  </section>

                  <div className="grid md:grid-cols-2 gap-6">
                    <section>
                      <h3 className="text-xl font-bold text-gray-700 mb-2">What to Include</h3>
                      <ul className="list-disc pl-5 text-gray-600 space-y-2">
                        {healthPlan.whatToInclude.map((item, index) => (
                          <li key={index}>{item}</li>
                        ))}
                      </ul>
                    </section>
                    <section>
                      <h3 className="text-xl font-bold text-gray-700 mb-2">What to Exclude</h3>
                      <ul className="list-disc pl-5 text-gray-600 space-y-2">
                        {healthPlan.whatToExclude.map((item, index) => (
                          <li key={index}>{item}</li>
                        ))}
                      </ul>
                    </section>
                  </div>

                  <section>
                    <h3 className="text-xl font-bold text-gray-700 mb-2">Mental Boost Recommendations</h3>
                    <ul className="list-disc pl-5 text-gray-600 space-y-2">
                      {healthPlan.mentalBoostRecommendations.map((item, index) => (
                        <li key={index}>{item}</li>
                      ))}
                    </ul>
                  </section>
                </div>
              )}
              
              {error && (
                <div className="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mt-4" role="alert">
                  <span className="block sm:inline">{error}</span>
                </div>
              )}

              <div className="flex justify-center mt-8">
                <button
                  onClick={handleGenerateMealPlan}
                  className="px-6 py-3 bg-gradient-to-r from-purple-500 to-pink-600 text-white font-bold rounded-xl shadow-md hover:shadow-lg transition-all flex items-center gap-2"
                  disabled={mealPlanLoading}
                >
                  {mealPlanLoading ? (
                    <>
                      <Loader2 className="animate-spin h-5 w-5" />
                      Generating Meal Plan...
                    </>
                  ) : (
                    <>
                      <Sparkles />
                      Generate Meal Plan
                    </>
                  )}
                </button>
              </div>

              {mealPlan && (
                <div className="mt-8">
                  <h3 className="text-2xl font-bold text-gray-800 mb-4">Your Personalized Meal Plan</h3>
                  <div className="grid gap-6 md:grid-cols-3">
                    {mealPlan.map((meal, index) => (
                      <div key={index} className="p-6 bg-gray-50 rounded-xl shadow">
                        <h4 className="font-semibold text-lg text-gray-700 mb-2">{meal.mealName}</h4>
                        <ul className="list-disc pl-5 text-gray-600 space-y-1">
                          {meal.foods.map((food, foodIndex) => (
                            <li key={foodIndex}>{food}</li>
                          ))}
                        </ul>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <button
                onClick={() => setAppState('form')}
                className="mt-8 w-full py-3 bg-gradient-to-r from-gray-500 to-gray-700 text-white font-bold rounded-xl shadow-md hover:shadow-lg transition-all"
              >
                Start New Analysis
              </button>
            </div>
          );
        }

        return (
          <div className="bg-white bg-opacity-90 p-8 rounded-2xl shadow-lg w-full max-w-2xl animate-in fade-in slide-in-from-top-8 duration-500">
            <h2 className="text-3xl md:text-4xl font-extrabold text-center text-gray-800 mb-6">Your Personal Health Diet Tracker</h2>
            {error && (
              <div className="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4" role="alert">
                <span className="block sm:inline">{error}</span>
              </div>
            )}
            <form onSubmit={handleSubmit} className="space-y-6">
              <div className="grid sm:grid-cols-3 gap-4">
                <div>
                  <label htmlFor="age" className="block text-sm font-medium text-gray-700 mb-1">Age (years)</label>
                  <input
                    type="number"
                    id="age"
                    name="age"
                    value={formData.age}
                    onChange={handleInputChange}
                    required
                    className="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-blue-500 focus:border-blue-500 transition-all"
                  />
                </div>
                <div>
                  <label htmlFor="weight" className="block text-sm font-medium text-gray-700 mb-1">Weight (kg)</label>
                  <input
                    type="number"
                    id="weight"
                    name="weight"
                    value={formData.weight}
                    onChange={handleInputChange}
                    required
                    className="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-blue-500 focus:border-blue-500 transition-all"
                  />
                </div>
                <div>
                  <label htmlFor="height" className="block text-sm font-medium text-gray-700 mb-1">Height (cm)</label>
                  <input
                    type="number"
                    id="height"
                    name="height"
                    value={formData.height}
                    onChange={handleInputChange}
                    required
                    className="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-blue-500 focus:border-blue-500 transition-all"
                  />
                </div>
              </div>
              <div>
                <label htmlFor="activityLevel" className="block text-sm font-medium text-gray-700 mb-1">Activity Level</label>
                <select
                  id="activityLevel"
                  name="activityLevel"
                  value={formData.activityLevel}
                  onChange={handleInputChange}
                  required
                  className="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-blue-500 focus:border-blue-500 transition-all"
                >
                  <option value="low">Low (Sedentary)</option>
                  <option value="moderate">Moderate (Active)</option>
                  <option value="high">High (Athlete)</option>
                </select>
              </div>
              <div>
                <label htmlFor="dailyFoodIntake" className="block text-sm font-medium text-gray-700 mb-1">Daily Food Intake (e.g., "Breakfast: 2 eggs, toast. Lunch: chicken salad... ")</label>
                <textarea
                  id="dailyFoodIntake"
                  name="dailyFoodIntake"
                  rows="6"
                  value={formData.dailyFoodIntake}
                  onChange={handleInputChange}
                  required
                  className="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-blue-500 focus:border-blue-500 transition-all resize-none"
                  placeholder="Please describe your daily food intake in detail."
                ></textarea>
              </div>
              <button
                type="submit"
                className="w-full py-3 bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-bold rounded-xl shadow-md hover:shadow-lg transition-all"
              >
                Generate Health Plan
              </button>
            </form>
          </div>
        );
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4 bg-gray-100 font-[Inter] bg-cover bg-center" style={{ backgroundImage: `url('https://images.unsplash.com/photo-1512621776951-a57141f2eefd?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D')` }}>
          {renderContent()}
        </div>
      );
    };

    const container = document.getElementById('root');
    const root = createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
